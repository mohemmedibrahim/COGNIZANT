<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Navigation Example</title>

    <style>

        nav{
            background-color:black;
            padding:15px;
        }

        nav a{
            color:white;
            margin-right:20px;
            text-decoration:none;
            font-size:18px;
        }

        section{
            height:500px;
            padding:20px;
            border-bottom:2px solid gray;
        }

    </style>

</head>

<body>

    <nav>

        <a href="#home">Home</a>
   <a href="#events">Events</a>

        <a href="#contact">Contact</a>

        <a href="help.html" target="_blank">
            Help
        </a>

    </nav>

    <section id="home">

        <h1>Home Section</h1>

        <p>
            Welcome to the Student Portal Home Page.
        </p>

    </section>

    <section id="events">

        <h1>Events Section</h1>

        <p>
            Upcoming technical and cultural events are displayed here.
        </p>

    </section>

    <!-- Contact Section -->

    <section id="contact">

        <h1>Contact Section</h1>

        <p>
            Contact us at studentportal@gmail.com
        </p>

    </section>

</body>

</html>
