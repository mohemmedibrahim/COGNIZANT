<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Event Promo Video</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container{
            width: 700px;
            margin: 40px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            color: darkblue;
        }

        video{
            border: 5px solid blue;
            border-radius: 10px;
        }

        #statusMessage{
            margin-top: 15px;
            color: green;
            font-weight: bold;
            font-size: 18px;
        }

        textarea{
            width: 90%;
            height: 100px;
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Community Event Promo Video</h2>

        <video 
            width="600"
            controls
            oncanplay="videoReady()"
        >

            <source 
                src="https://www.w3schools.com/html/mov_bbb.mp4"
                type="video/mp4"
            >

            Your browser does not support video.

        </video>
        <p id="statusMessage"></p>

        <h3>Feedback Form</h3>

        <textarea 
            id="feedback"
            placeholder="Enter your feedback here..."
        ></textarea>

    </div>

    <script>

        function videoReady(){

            document.getElementById("statusMessage").innerHTML =
            "Video ready to play";

        }

        window.onbeforeunload = function(){

            let feedback =
            document.getElementById("feedback").value;

            if(feedback !== ""){

                return "You have unsaved changes. Are you sure you want to leave?";

            }

        }

    </script>

</body>

</html>
