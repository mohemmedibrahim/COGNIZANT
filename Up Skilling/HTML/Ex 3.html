<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>

        #welcomeBanner{
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            margin: 20px;
        }

        .highlight{
            background-color: yellow;
            font-weight: bold;
            padding: 5px;
        }

    </style>

</head>

<body>

    <div id="welcomeBanner">
        <h1 class="highlight">
            Welcome Back User!
        </h1>

        <p>
            You have successfully logged in to the portal.
        </p>

        <p>
            <span style="color:red; font-weight:bold;">
                Special Offer: Get 50% Discount Today!
            </span>
        </p>

        <p class="highlight">
            Hurry Up! Limited Time Offer.
        </p>

    </div>

</body>

</html>
