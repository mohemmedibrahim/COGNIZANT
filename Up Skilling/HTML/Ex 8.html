<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Preferences</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container{
            width: 450px;
            margin: 50px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
            color: darkblue;
        }

        label{
            font-weight: bold;
        }

        select{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button{
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

        #message{
            text-align: center;
            color: green;
            font-weight: bold;
            margin-top: 15px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Event Preference</h2>

        <label>Select Preferred Event</label>

        <select id="eventType">

            <option value="">
                Select Event
            </option>

            <option value="Technical Workshop">
                Technical Workshop
            </option>

            <option value="Cultural Event">
                Cultural Event
            </option>

            <option value="Sports Tournament">
                Sports Tournament
            </option>

        </select>

        <button onclick="savePreference()">
            Save Preference
        </button>

        <button onclick="clearPreferences()">
            Clear Preferences
        </button>

        <p id="message"></p>

    </div>

    <script>

        window.onload = function(){

            let savedEvent =
            localStorage.getItem("preferredEvent");

            if(savedEvent){

                document.getElementById("eventType").value =
                savedEvent;

            }

        }

        function savePreference(){

            let selectedEvent =
            document.getElementById("eventType").value;

            localStorage.setItem(
                "preferredEvent",
                selectedEvent
            );

            sessionStorage.setItem(
                "sessionEvent",
                selectedEvent
            );

            document.getElementById("message").innerHTML =
            "Preference Saved Successfully!";

        }

        function clearPreferences(){

            localStorage.clear();


            sessionStorage.clear();
            document.getElementById("eventType").value = "";

            document.getElementById("message").innerHTML =
            "Preferences Cleared Successfully!";

        }

    </script>

</body>

</html>
