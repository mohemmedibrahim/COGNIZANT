<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Event Handling</title>

    <style>

        body{

            font-family: Arial, sans-serif;

            background-color: #f2f2f2;

            padding: 20px;

        }

        h1{

            text-align: center;

            color: darkblue;

        }

        .controls{

            width: 80%;

            margin: 20px auto;

            display: flex;

            gap: 20px;

            justify-content: center;

        }

        select,
        input{

            padding: 10px;

            width: 250px;

            border-radius: 5px;

            border: 1px solid gray;

        }

        #eventContainer{

            width: 80%;

            margin: auto;

        }

        .eventCard{

            background-color: white;

            padding: 20px;

            margin-bottom: 20px;

            border-radius: 10px;

            box-shadow: 0px 0px 10px gray;

        }

        button{

            padding: 10px 15px;

            background-color: green;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;

        }

        button:hover{

            background-color: darkgreen;

        }

    </style>

</head>

<body>

    <h1>
        Community Event Portal
    </h1>

    <div class="controls">

        <select id="categoryFilter" onchange="filterEvents()">

            <option value="All">
                All Categories
            </option>

            <option value="Technical">
                Technical
            </option>

            <option value="Music">
                Music
            </option>

            <option value="Sports">
                Sports
            </option>

        </select>

        <input 
            type="text"
            id="searchBox"
            placeholder="Search Event Name"
            onkeydown="searchEvent()"
        >

    </div>

    <div id="eventContainer"></div>

    <script>

const events = [

    {
        name: "AI Workshop",
        category: "Technical",
        seats: 5
    },

    {
        name: "Music Concert",
        category: "Music",
        seats: 3
    },

    {
        name: "Football Tournament",
        category: "Sports",
        seats: 4
    },

    {
        name: "Web Development Bootcamp",
        category: "Technical",
        seats: 6
    }

];


const container =
document.getElementById("eventContainer");


function displayEvents(eventList){

    container.innerHTML = "";

    eventList.forEach(function(event){

        const card =
        document.createElement("div");

        card.classList.add("eventCard");
        card.innerHTML =

        `
        <h2>${event.name}</h2>

        <p>
            Category: ${event.category}
        </p>

        <p>
            Available Seats: ${event.seats}
        </p>
        `;

        const button =
        document.createElement("button");

        button.textContent = "Register";

        button.onclick = function(){

            if(event.seats > 0){

                event.seats--;

                alert(
                    "Registered for " + event.name
                );

                displayEvents(eventList);

            }
            else{

                alert(
                    "No Seats Available"
                );

            }

        };

        card.appendChild(button);

        container.appendChild(card);

    });

}

function filterEvents(){

    const selectedCategory =

    document.getElementById(
        "categoryFilter"
    ).value;

    if(selectedCategory === "All"){

        displayEvents(events);

    }
    else{

        const filteredEvents =

        events.filter(function(event){

            return event.category === selectedCategory;

        });

        displayEvents(filteredEvents);

    }

}

function searchEvent(){

    setTimeout(function(){

        const searchText =

        document.getElementById(
            "searchBox"
        ).value.toLowerCase();

        const searchedEvents =

        events.filter(function(event){

            return event.name
            .toLowerCase()
            .includes(searchText);

        });

        displayEvents(searchedEvents);

    }, 100);

}

displayEvents(events);

    </script>

</body>

</html>
